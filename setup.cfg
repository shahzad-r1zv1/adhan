[flake8]
max-line-length = 120
exclude = .git,__pycache__
ignore = E127,E128,W503,W504
# praytimes.py is a third-party library (PrayTimes.org) that uses tab
# indentation; it is intentionally excluded from strict style checks to
# avoid an unrelated reformatting diff.
per-file-ignores =
    praytimes.py:E1,E2,E3,E5,E7,W191,F841
